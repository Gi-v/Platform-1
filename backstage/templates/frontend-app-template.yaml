apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: frontend-app
  title: Frontend Application
  description: Scaffolds a React/Next.js frontend with CDN, CI, ArgoCD app, and namespace.
  tags: [frontend, react, nextjs]
spec:
  owner: platform-team
  type: website

  parameters:
    - title: App Info
      required: [name, team]
      properties:
        name:
          title: App Name
          type: string
        team:
          title: Team
          type: string
        framework:
          title: Framework
          type: string
          enum: [nextjs, react-vite, nuxt]
          default: nextjs
        enableCDN:
          title: Enable CloudFront CDN?
          type: boolean
          default: true
        repoUrl:
          title: GitHub Repository
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts: [github.com]

  steps:
    - id: fetch-template
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./frontend-skeleton
        values:
          name: ${{ parameters.name }}
          team: ${{ parameters.team }}
          framework: ${{ parameters.framework }}
          enableCDN: ${{ parameters.enableCDN }}

    - id: publish
      name: Create GitHub Repo
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main

    - id: create-argocd-app
      name: Register ArgoCD Application
      action: argocd:create-application
      input:
        appName: ${{ parameters.name }}
        argoInstance: main
        projectName: default
        repoUrl: ${{ steps.publish.output.remoteUrl }}
        path: k8s
        namespace: ${{ parameters.name }}
        syncPolicy: automated

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
