# Root app-of-apps.
# Manages: platform portal + tenant ApplicationSet.
# Infrastructure (Crossplane, Vault, Kyverno etc.) is managed by bootstrap.sh
# via Helm directly to avoid ownership conflicts.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Gi-v/platform-one
    targetRevision: HEAD
    path: infrastructure/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
