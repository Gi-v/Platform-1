# SecretStore — points ESO at the local dev Vault instance
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          namespace: external-secrets
          key: token
---
# The token secret for ESO to authenticate to Vault (dev mode uses root token)
apiVersion: v1
kind: Secret
metadata:
  name: vault-token
  namespace: external-secrets
type: Opaque
stringData:
  token: "root"   # dev-mode root token — replace in production with k8s auth
---
# Example: pull microservice DB password from Vault into a k8s Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: microservice-db-secret
  namespace: microservice
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: microservice-db-secret
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef:
        key: secret/microservice/database
        property: host
    - secretKey: password
      remoteRef:
        key: secret/microservice/database
        property: password
    - secretKey: username
      remoteRef:
        key: secret/microservice/database
        property: username
