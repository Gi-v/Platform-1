name: Portal

on:
  push:
    branches: [main]
    paths:
      - portal/**
  pull_request:
    paths:
      - portal/**

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}/portal

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push portal image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: portal
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: Cosign sign
        if: github.event_name == 'push'
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"

      - name: Update portal k8s image tag
        if: github.event_name == 'push'
        run: |
          sed -i "s|image: .*portal:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}|g" \
            portal/k8s/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portal/k8s/deployment.yaml
          git diff --staged --quiet || \
            git commit -m "chore: bump portal to ${{ github.sha }} [skip ci]"
          git push
